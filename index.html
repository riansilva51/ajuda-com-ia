<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 12-03</title>

    <style>
        /* Reset básico para remover margens padrão do navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .banner {
            width: 100%;
            height: 300px;
            /* Adicionei um gradiente linear como 'overlay' para garantir a leitura do texto */
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), 
                        url('imagem.jpg') no-repeat center center;
            background-size: cover;
            
            /* Centralização moderna com Flexbox */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
           /* Cor geral para o banner (opcional, como um padrão) */
.banner {
    color: white; 
}

/* Regra específica para o Título */
.banner h1 {
    color: #FFD700; /* Um dourado, por exemplo */
    -webkit-text-stroke: 1px black; /* O contorno que aprendemos */
    margin-bottom: 20px;
}

/* Regra específica para o Parágrafo */
.banner p {
    color: #00FFCC; /* Um tom de ciano/verde água */
    font-size: 1.2rem;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); /* Sombra para leitura */
}

        }

       .banner {
    /* Faz o banner ter exatamente a altura da tela do usuário */
    width: 100%;
    height: 100vh; 

    /* A imagem vai cobrir tudo sem distorcer (ela corta as sobras) */
    background-image: url('imagem.jpg');
    background-size: cover; 
    
    /* Mantém o foco da imagem no centro ao redimensionar */
    background-position: center;
    background-repeat: no-repeat;

    /* Centraliza o texto no meio da tela */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
    </style>
</head>
<body>

    <header class="banner">
        <h1>Atividade</h1>
        <p>Este exemplo demonstra como utilizar uma imagem de fundo utilizando HTML e CSS moderno.</p>
    </header>

</body>
</html>
